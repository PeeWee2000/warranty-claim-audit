services:
  api:
    build: ./services/api
    ports:
      - "8000:8000"
    environment:
      - WCA_DEBUG=true
      - WCA_QDRANT_HOST=qdrant
      - WCA_QDRANT_PORT=6333
      - WCA_MODEL_DIR=/app/data/models
      - WCA_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./data/models:/app/data/models:ro
    restart: unless-stopped

  web-ui:
    build: ./services/web-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
